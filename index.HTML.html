<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Română — Language Learning</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { background: #0f0f1a; font-family: 'Segoe UI', system-ui, sans-serif; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0f1a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const CLAUDE_MODEL = "claude-sonnet-4-20250514";
const STORAGE_KEY = "romanian_app_data";

const defaultData = {
  learnedWords: [],
  chatHistory: [],
  streak: { lastDate: null, count: 0 },
  totalWords: 0,
};

function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? { ...defaultData, ...JSON.parse(s) } : defaultData;
  } catch { return defaultData; }
}

function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}

function speak(text, lang = "ro-RO") {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

async function callClaude(messages, system = "") {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 1000,
      system,
      messages,
    }),
  });
  const data = await res.json();
  return data.content?.map(b => b.text || "").join("") || "";
}

// ─── HEADER ───────────────────────────────────────────────────────────────────
function Header({ appData }) {
  const streak = appData.streak?.count || 0;
  const words = appData.learnedWords?.length || 0;
  return (
    <div style={{ background: "linear-gradient(135deg,#1a1a2e,#16213e)", padding: "16px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "2px solid #00d4ff" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 28 }}>🇷🇴</span>
        <div>
          <div style={{ color: "#00d4ff", fontWeight: 800, fontSize: 18, letterSpacing: 1 }}>ROMÂNĂ</div>
          <div style={{ color: "#aaa", fontSize: 11 }}>Language Learning</div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 20 }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ color: "#ff6b35", fontSize: 20, fontWeight: 800 }}>🔥 {streak}</div>
          <div style={{ color: "#aaa", fontSize: 10 }}>Day Streak</div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div style={{ color: "#00d4ff", fontSize: 20, fontWeight: 800 }}>📚 {words}</div>
          <div style={{ color: "#aaa", fontSize: 10 }}>Words Learned</div>
        </div>
      </div>
    </div>
  );
}

// ─── CHAT TAB ─────────────────────────────────────────────────────────────────
const CHAT_SYSTEM = `You are a warm, encouraging Romanian language tutor for an English speaker. 
The learner is a BEGINNER but has Romanian family and has lived in Romania, so they may know random words/phrases.
They want to practice everyday conversation and opinions with family and random people.

RULES:
1. Speak mostly in Romanian using SHORT, SIMPLE sentences. Use only common words for beginners.
2. Every Romanian reply must include:
   - The Romanian sentence
   - Phonetic pronunciation in parentheses (e.g. "boo-nah ZEE-wa")
   - English translation in brackets [Good day]
3. If the learner makes a Romanian mistake, kindly correct it: show what they wrote → corrected version → one-line explanation.
4. Keep replies to 1-2 sentences MAX. Always end with a simple question to keep conversation going.
5. If asked to role-play (barista, taxi, etc.) — stay in character in Romanian, keep correcting.
6. If asked to break down a sentence word by word: show each word, its meaning, and grammar note.
7. If asked for a flashcard list on a topic: give exactly 10 words/phrases with Romanian | pronunciation | English.
8. If asked for a short story: write one using only simple, common vocabulary.
9. You have memory of this conversation. Gently review old words before teaching new ones.
10. NEVER give a grammar lecture. Teach by talking. Make the learner feel progress.
11. Format your response clearly with line breaks between the Romanian, pronunciation, and translation.`;

function ChatTab({ appData, setAppData }) {
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const msgs = appData.chatHistory || [];

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: "user", content: input };
    const newHistory = [...msgs, userMsg];
    const updated = { ...appData, chatHistory: newHistory };
    setAppData(updated);
    saveData(updated);
    setInput("");
    setLoading(true);
    try {
      const apiMsgs = newHistory.map(m => ({ role: m.role, content: m.content }));
      const reply = await callClaude(apiMsgs, CHAT_SYSTEM);
      const assistantMsg = { role: "assistant", content: reply };
      const final = { ...updated, chatHistory: [...newHistory, assistantMsg] };
      setAppData(final);
      saveData(final);
    } catch (e) {
      const err = { role: "assistant", content: "⚠️ Error connecting to tutor. Please try again." };
      const final = { ...updated, chatHistory: [...newHistory, err] };
      setAppData(final);
    }
    setLoading(false);
  };

  const clearChat = () => {
    const updated = { ...appData, chatHistory: [] };
    setAppData(updated);
    saveData(updated);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "#0f0f1a" }}>
      <div style={{ padding: "10px 16px", background: "#1a1a2e", borderBottom: "1px solid #333", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <span style={{ color: "#00d4ff", fontWeight: 700 }}>💬 Your Romanian Tutor</span>
          <span style={{ color: "#888", fontSize: 12, marginLeft: 10 }}>Beginner · Everyday conversation</span>
        </div>
        <button onClick={clearChat} style={{ background: "#333", border: "none", color: "#aaa", padding: "4px 10px", borderRadius: 6, cursor: "pointer", fontSize: 12 }}>Clear</button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
        {msgs.length === 0 && (
          <div style={{ textAlign: "center", color: "#555", marginTop: 40 }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>👋</div>
            <div style={{ color: "#00d4ff", fontSize: 16, fontWeight: 700 }}>Bună ziua!</div>
            <div style={{ color: "#888", marginTop: 6, fontSize: 13 }}>Start chatting to begin your Romanian lesson.</div>
            <div style={{ marginTop: 16, display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>
              {["Say hello to me!", "Role-play: I'm at a café", "Teach me family words", "Give me a short story"].map(s => (
                <button key={s} onClick={() => setInput(s)} style={{ background: "#1a1a2e", border: "1px solid #00d4ff33", color: "#00d4ff", padding: "6px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12 }}>{s}</button>
              ))}
            </div>
          </div>
        )}
        {msgs.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
            <div style={{
              maxWidth: "80%", padding: "10px 14px",
              borderRadius: m.role === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
              background: m.role === "user" ? "linear-gradient(135deg,#00d4ff,#0099cc)" : "#1e1e30",
              color: m.role === "user" ? "#000" : "#e0e0e0", fontSize: 14, lineHeight: 1.6,
              border: m.role === "assistant" ? "1px solid #333" : "none",
              whiteSpace: "pre-wrap"
            }}>
              {m.content}
              {m.role === "assistant" && (
                <button onClick={() => speak(m.content.split("\n")[0])} style={{ marginLeft: 8, background: "none", border: "none", cursor: "pointer", fontSize: 14 }}>🔊</button>
              )}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", justifyContent: "flex-start" }}>
            <div style={{ background: "#1e1e30", border: "1px solid #333", padding: "10px 16px", borderRadius: "18px 18px 18px 4px", color: "#888" }}>
              <span style={{ animation: "pulse 1s infinite" }}>Tutorul tău scrie... ✍️</span>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div style={{ padding: 12, background: "#1a1a2e", borderTop: "1px solid #333", display: "flex", gap: 8 }}>
        <input
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder="Type in English or Romanian..."
          style={{ flex: 1, background: "#0f0f1a", border: "1px solid #333", borderRadius: 24, padding: "10px 16px", color: "#fff", fontSize: 14, outline: "none" }}
        />
        <button onClick={send} disabled={loading} style={{ background: "linear-gradient(135deg,#00d4ff,#0099cc)", border: "none", borderRadius: 24, padding: "10px 20px", color: "#000", fontWeight: 800, cursor: "pointer", fontSize: 14 }}>
          {loading ? "..." : "Send"}
        </button>
      </div>
    </div>
  );
}

function AlphabetTab() {
  const [selected, setSelected] = useState(null);
  return (
    <div style={{ padding: 16, overflowY: "auto", background: "#0f0f1a", height: "100%" }}>
      <h2 style={{ color: "#00d4ff", marginBottom: 4, fontWeight: 800 }}>Romanian Alphabet</h2>
      <p style={{ color: "#888", fontSize: 13, marginBottom: 16 }}>Tap any letter to hear it and see an example word.</p>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(90px, 1fr))", gap: 10 }}>
        {ALPHABET.map((a, i) => (
          <div key={i} onClick={() => { setSelected(a); speak(a.ex); }}
            style={{ background: selected?.l === a.l ? "linear-gradient(135deg,#00d4ff,#0099cc)" : "#1e1e30", border: "1px solid #333", borderRadius: 12, padding: "12px 8px", textAlign: "center", cursor: "pointer", transition: "all 0.2s" }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: selected?.l === a.l ? "#000" : "#fff" }}>{a.l}</div>
            <div style={{ fontSize: 11, color: selected?.l === a.l ? "#003" : "#888", marginTop: 2 }}>{a.ph}</div>
          </div>
        ))}
      </div>
      {selected && (
        <div style={{ marginTop: 20, background: "#1e1e30", border: "1px solid #00d4ff44", borderRadius: 16, padding: 20 }}>
          <div style={{ fontSize: 32, fontWeight: 900, color: "#00d4ff" }}>{selected.l}</div>
          <div style={{ color: "#aaa", fontSize: 14, marginTop: 4 }}>Pronounced: <span style={{ color: "#fff" }}>{selected.ph}</span></div>
          <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 24 }}>📖</span>
            <div>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: 18 }}>{selected.ex}</div>
              <div style={{ color: "#888", fontSize: 13 }}>= {selected.exMean}</div>
            </div>

          </div>

      )}
    </div>

}

// ─── VOCAB TAB ────────────────────────────────────────────────────────────────
const PRESET_DECKS = {
  "👋 Greetings": [

function VocabTab({ appData, setAppData }) {
  const [activeDeck, setActiveDeck] = useState(null);
  const [cards, setCards] = useState([]);
  const [cardIdx, setCardIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [topic, setTopic] = useState("");
  const [generating, setGenerating] = useState(false);
  const [deckName, setDeckName] = useState("");

  const openDeck = (name, deck) => { setDeckName(name); setCards(deck); setActiveDeck(true); setCardIdx(0); setFlipped(false); };

  const generateDeck = async () => {
    if (!topic.trim()) return;
    setGenerating(true);
    try {
      const sys = `You are a Romanian vocabulary teacher. Return ONLY a JSON array of exactly 10 objects, no markdown, no explanation. Each object: {"ro":"Romanian word/phrase","ph":"phonetic pronunciation","en":"English meaning"}. Topic: ${topic}`;
      const raw = await callClaude([{ role: "user", content: `Create 10 Romanian flashcards for the topic: ${topic}` }], sys);
      const clean = raw.replace(/```json|```/g, "").trim();
      const deck = JSON.parse(clean);
      openDeck(`✨ ${topic}`, deck);
    } catch { alert("Error generating deck. Try again."); }
    setGenerating(false);
  };

  const markLearned = () => {
    const word = cards[cardIdx];
    const existing = appData.learnedWords || [];
    if (!existing.find(w => w.ro === word.ro)) {
      const updated = { ...appData, learnedWords: [...existing, word] };
      setAppData(updated);
      saveData(updated);
    }
  };

  if (activeDeck && cards.length) {
    const card = cards[cardIdx];
    return (
      <div style={{ padding: 20, background: "#0f0f1a", height: "100%", display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <button onClick={() => setActiveDeck(false)} style={{ background: "#1e1e30", border: "1px solid #333", color: "#aaa", padding: "6px 12px", borderRadius: 8, cursor: "pointer" }}>← Back</button>
          <span style={{ color: "#00d4ff", fontWeight: 700 }}>{deckName}</span>
          <span style={{ color: "#888", fontSize: 12, marginLeft: "auto" }}>{cardIdx + 1} / {cards.length}</span>
        </div>
        <div onClick={() => setFlipped(!flipped)} style={{ flex: 1, maxHeight: 280, background: flipped ? "linear-gradient(135deg,#00d4ff,#0099cc)" : "#1e1e30", border: "1px solid #333", borderRadius: 20, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", cursor: "pointer", padding: 30, textAlign: "center" }}>
          {!flipped ? (
            <>
              <div style={{ fontSize: 32, fontWeight: 900, color: "#fff", marginBottom: 8 }}>{card.ro}</div>
              <div style={{ color: "#888", fontSize: 13 }}>({card.ph})</div>
              <div style={{ color: "#555", fontSize: 12, marginTop: 16 }}>Tap to reveal</div>
            </>
          ) : (
            <>
              <div style={{ fontSize: 28, fontWeight: 900, color: "#000" }}>{card.en}</div>
              <div style={{ color: "#003", fontSize: 14, marginTop: 8 }}>{card.ro}</div>
            </>
          )}
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
          <button onClick={() => speak(card.ro)} style={{ flex: 1, background: "#1e1e30", border: "1px solid #333", color: "#fff", padding: 12, borderRadius: 12, cursor: "pointer" }}>🔊 Hear</button>
          <button onClick={markLearned} style={{ flex: 1, background: "#1e1e30", border: "1px solid #00ff88", color: "#00ff88", padding: 12, borderRadius: 12, cursor: "pointer" }}>✓ Learned</button>
          <button onClick={() => { setCardIdx((cardIdx + 1) % cards.length); setFlipped(false); }} style={{ flex: 1, background: "linear-gradient(135deg,#00d4ff,#0099cc)", border: "none", color: "#000", padding: 12, borderRadius: 12, cursor: "pointer", fontWeight: 700 }}>Next →</button>
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
          {cards.map((_, i) => (
            <div key={i} onClick={() => { setCardIdx(i); setFlipped(false); }} style={{ width: 10, height: 10, borderRadius: "50%", background: i === cardIdx ? "#00d4ff" : "#333", cursor: "pointer" }} />
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: 16, overflowY: "auto", background: "#0f0f1a", height: "100%" }}>
      <h2 style={{ color: "#00d4ff", fontWeight: 800, marginBottom: 4 }}>Vocabulary Decks</h2>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 }}>
        {Object.entries(PRESET_DECKS).map(([name, deck]) => (
          <div key={name} onClick={() => openDeck(name, deck)} style={{ background: "#1e1e30", border: "1px solid #333", borderRadius: 14, padding: 16, cursor: "pointer", textAlign: "center" }}>
            <div style={{ fontSize: 28 }}>{name.split(" ")[0]}</div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 13, marginTop: 4 }}>{name.split(" ").slice(1).join(" ")}</div>
            <div style={{ color: "#888", fontSize: 11 }}>{deck.length} cards</div>
          </div>
        ))}
      </div>
      <div style={{ background: "#1e1e30", border: "1px solid #00d4ff44", borderRadius: 16, padding: 16 }}>

        </div>

}

const TRANSLATE_SYSTEM = `You are a Romanian-English translation assistant. 
When given text, detect if it's English or Romanian, translate it, and provide:
1. Original text
2. Translation
3. Phonetic pronunciation of the Romanian text (in parentheses)
4. Word-by-word breakdown as a list: each word | meaning | grammar note (gender, tense, case etc.)

Format your response EXACTLY like this:
TRANSLATION: [translated text]
PRONUNCIATION: [phonetic]
BREAKDOWN:
- word: meaning (grammar note)
- word: meaning (grammar note)
...`;

function TranslateTab() {
  const [input, setInput] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const translate = async () => {
    if (!input.trim()) return;
    setLoading(true);
    try {
      const raw = await callClaude([{ role: "user", content: input }], TRANSLATE_SYSTEM);
      setResult({ raw, original: input });
    } catch { setResult({ raw: "⚠️ Translation error.", original: input }); }
    setLoading(false);
  };

  const parseResult = (raw) => {
    const lines = raw.split("\n");
    let translation = "", pronunciation = "", breakdown = [];
    let inBreakdown = false;
    for (const line of lines) {
      if (line.startsWith("TRANSLATION:")) translation = line.replace("TRANSLATION:", "").trim();
      else if (line.startsWith("PRONUNCIATION:")) pronunciation = line.replace("PRONUNCIATION:", "").trim();
      else if (line.startsWith("BREAKDOWN:")) inBreakdown = true;
      else if (inBreakdown && line.trim().startsWith("-")) breakdown.push(line.replace("-", "").trim());
    }
    return { translation, pronunciation, breakdown };
  };

  return (
    <div style={{ padding: 16, overflowY: "auto", background: "#0f0f1a", height: "100%" }}>
      <h2 style={{ color: "#00d4ff", fontWeight: 800, marginBottom: 4 }}>Translate</h2>
      <p style={{ color: "#888", fontSize: 13, marginBottom: 16 }}>Type English or Romanian — auto-detected.</p>
      <textarea value={input} onChange={e => setInput(e.target.value)} placeholder="Type anything here..." rows={3}
        style={{ width: "100%", background: "#1e1e30", border: "1px solid #333", borderRadius: 12, padding: 14, color: "#fff", fontSize: 15, resize: "none", outline: "none" }} />
      <button onClick={translate} disabled={loading} style={{ width: "100%", marginTop: 8, background: "linear-gradient(135deg,#00d4ff,#0099cc)", border: "none", borderRadius: 12, padding: 14, color: "#000", fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
        {loading ? "Translating..." : "🔄 Translate"}
      </button>
      {result && (() => {
        const { translation, pronunciation, breakdown } = parseResult(result.raw);
        return (
          <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ background: "#1e1e30", border: "1px solid #333", borderRadius: 14, padding: 14 }}>
              <div style={{ color: "#888", fontSize: 11, marginBottom: 4 }}>ORIGINAL</div>
              <div style={{ color: "#fff", fontSize: 15 }}>{result.original}</div>
            </div>
            <div style={{ background: "#1e1e30", border: "1px solid #00d4ff44", borderRadius: 14, padding: 14 }}>
              <div style={{ color: "#00d4ff", fontSize: 11, marginBottom: 4 }}>TRANSLATION</div>
              <div style={{ color: "#fff", fontSize: 18, fontWeight: 700 }}>{translation || result.raw}</div>
              {pronunciation && <div style={{ color: "#888", fontSize: 13, marginTop: 4 }}>({pronunciation})</div>}
              {translation && <button onClick={() => speak(translation)} style={{ marginTop: 8, background: "#00d4ff22", border: "1px solid #00d4ff", color: "#00d4ff", borderRadius: 20, padding: "4px 12px", cursor: "pointer", fontSize: 12 }}>🔊 Hear</button>}
            </div>
            {breakdown.length > 0 && (
              <div style={{ background: "#1e1e30", border: "1px solid #333", borderRadius: 14, padding: 14 }}>
                <div style={{ color: "#ff6b35", fontSize: 11, marginBottom: 8 }}>WORD-BY-WORD BREAKDOWN</div>
                {breakdown.map((b, i) => {
                  const [word, rest] = b.split(":").map(s => s.trim());
                  return (
                    <div key={i} style={{ display: "flex", gap: 8, padding: "6px 0", borderBottom: i < breakdown.length - 1 ? "1px solid #2a2a3a" : "none", flexWrap: "wrap" }}>
                      <span style={{ color: "#00d4ff", fontWeight: 700, minWidth: 80 }}>{word}</span>
                      <span style={{ color: "#ccc", flex: 1 }}>{rest}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

const TENSE_COLORS = {
  "Present": "#00d4ff", "Imperfect": "#ff6b35", "Perfect Compus": "#00ff88",
  "Perfect Simplu": "#a855f7", "Mai Mult Ca Perfect": "#ff4d8d",
  "Viitor": "#ffd700", "Viitor Anterior": "#c0a000",
  "Conditional": "#f97316", "Cond. Perfect": "#b45309",
  "Conjunctiv": "#818cf8", "Imperativ": "#e879f9",
};

const TENSE_TIPS = {
  "Present": "Prezent — current actions and general truths. No continuous form; 'eu merg' = both 'I go' and 'I am going'.",
  "Imperfect": "Imperfect — ongoing or repeated past actions. Like 'I was going' or 'I used to go'. Great for storytelling.",
  "Perfect Compus": "Perfect Compus — the most common past tense in speech. 'am mers' = 'I went / I have gone'. Always use this in conversation.",
  "Perfect Simplu": "Perfect Simplu — literary/formal past, common only in southern Romania (Oltenia). Prefer Perfect Compus in everyday speech.",
  "Mai Mult Ca Perfect": "Mai Mult Ca Perfect — pluperfect, 'I had done'. Used for an action completed before another past action.",
  "Viitor": "Viitor — formal future with 'voi/vei/va...'. Informally Romanians say 'o să merg' (o să + subjunctive) or 'am să merg'.",
  "Viitor Anterior": "Viitor Anterior — 'will have done'. Rare but appears in formal writing and conditional chains.",
  "Conditional": "Condițional — 'would do'. Formed with 'aș/ai/ar/am/ați/ar' + infinitive. Very useful for polite requests.",
  "Cond. Perfect": "Condițional Perfect — 'would have done'. Used in hypothetical past: 'aș fi mers' = 'I would have gone'.",
  "Conjunctiv": "Conjunctiv (Subjunctive) — always with 'să'. Essential after 'vreau să' (I want to), 'trebuie să' (must), 'pot să' (I can).",
  "Imperativ": "Imperativ — commands. The 'tu' form is most used. Negative commands use 'nu' + infinitive: 'nu merge!'.",
};

function ConjugationsTab() {
  const [selectedVerb, setSelectedVerb] = useState(Object.keys(CONJUGATIONS)[0]);
  const [selectedTense, setSelectedTense] = useState("Present");
  const [showRegular, setShowRegular] = useState(false);
  const [verbSearch, setVerbSearch] = useState("");

  const verb = CONJUGATIONS[selectedVerb];
  const tenses = Object.keys(verb).filter(k => k !== "en" && k !== "group");
  const table = verb[selectedTense];
  const pronouns = ["eu", "tu", "el/ea", "noi", "voi", "ei/ele"];

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "#0f0f1a", overflow: "hidden" }}>
      <div style={{ overflowY: "auto", flex: 1, padding: 16 }}>
        <h2 style={{ color: "#00d4ff", fontWeight: 800, marginBottom: 4 }}>Conjugations</h2>
        <p style={{ color: "#888", fontSize: 13, marginBottom: 14 }}>Select a verb and tense to see the full table.</p>

        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
          {Object.keys(CONJUGATIONS).map(v => (
            <button key={v} onClick={() => { setSelectedVerb(v); setSelectedTense("Present"); }} style={{ background: selectedVerb === v ? "linear-gradient(135deg,#00d4ff,#0099cc)" : "#1e1e30", border: "1px solid #333", color: selectedVerb === v ? "#000" : "#fff", padding: "6px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12, fontWeight: selectedVerb === v ? 800 : 400 }}>
              {v}
            </button>
          ))}
        </div>

        <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 18 }}>
          {tenses.map(t => (
            <button key={t} onClick={() => setSelectedTense(t)} style={{ background: selectedTense === t ? TENSE_COLORS[t] : "#1e1e30", border: `1px solid ${(TENSE_COLORS[t]||"#555")}55`, color: selectedTense === t ? "#000" : (TENSE_COLORS[t]||"#aaa"), padding: "5px 11px", borderRadius: 20, cursor: "pointer", fontSize: 11, fontWeight: 700 }}>
              {t}
            </button>
          ))}
        </div>

        <div style={{ background: "#1e1e30", border: `1px solid ${(TENSE_COLORS[selectedTense]||"#555")}44`, borderRadius: 16, overflow: "hidden", marginBottom: 14 }}>
          <div style={{ background: TENSE_COLORS[selectedTense]||"#555", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontWeight: 900, color: "#000", fontSize: 15 }}>{selectedVerb}</span>
            <span style={{ fontWeight: 700, color: "#000", fontSize: 12 }}>{selectedTense} · {verb.en}</span>
          </div>
          {pronouns.map((p, i) => (
            <div key={p} style={{ display: "flex", padding: "11px 16px", borderBottom: i < pronouns.length - 1 ? "1px solid #2a2a3a" : "none", alignItems: "center" }}>
              <span style={{ color: "#888", width: 65, fontSize: 13 }}>{p}</span>
              <span style={{ color: "#fff", fontWeight: 700, fontSize: 15, flex: 1 }}>{table?.[p] ?? "—"}</span>
              <button onClick={() => speak(table?.[p] ?? "")} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 15, color: "#555" }}>🔊</button>
            </div>
          ))}
        </div>

        <div style={{ background: "#1a1a0a", border: "1px solid #ffd70033", borderRadius: 14, padding: 14, marginBottom: 20 }}>
          <div style={{ color: "#ffd700", fontWeight: 700, marginBottom: 6, fontSize: 13 }}>💡 {selectedTense} — Tip</div>
          <div style={{ color: "#aaa", fontSize: 12, lineHeight: 1.7 }}>{TENSE_TIPS[selectedTense] || "Select a tense to see a tip."}</div>
        </div>

        {verb.group && VERB_GROUPS[verb.group] && (() => {
          const grp = VERB_GROUPS[verb.group];
          const filtered = grp.verbs.filter(v =>
            v.inf.toLowerCase().includes(verbSearch.toLowerCase()) ||
            v.en.toLowerCase().includes(verbSearch.toLowerCase())
          );
          return (
            <div style={{ background: "#1e1e30", border: `1px solid ${grp.color}44`, borderRadius: 16, overflow: "hidden" }}>
              <button onClick={() => setShowRegular(!showRegular)} style={{ width: "100%", background: "none", border: "none", padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
                <div>
                  <div style={{ color: grp.color, fontWeight: 800, fontSize: 14, textAlign: "left" }}>📋 {grp.label}</div>
                  <div style={{ color: "#888", fontSize: 12, textAlign: "left", marginTop: 2 }}>{grp.verbs.length} verbs follow this pattern</div>
                </div>
                <span style={{ color: grp.color, fontSize: 18 }}>{showRegular ? "▲" : "▼"}</span>
              </button>
              {showRegular && (
                <div style={{ padding: "0 16px 16px" }}>
                  <div style={{ background: "#0f0f1a", border: `1px solid ${grp.color}33`, borderRadius: 10, padding: 12, marginBottom: 12, fontSize: 12, color: "#aaa", lineHeight: 1.7 }}>
                    <span style={{ color: grp.color, fontWeight: 700 }}>Pattern: </span>
                    <span style={{ color: "#fff" }}>{grp.pattern}</span>
                  </div>
                  <input value={verbSearch} onChange={e => setVerbSearch(e.target.value)} placeholder="Search verbs..." style={{ width: "100%", background: "#0f0f1a", border: "1px solid #333", borderRadius: 8, padding: "8px 12px", color: "#fff", fontSize: 13, outline: "none", marginBottom: 10 }} />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, maxHeight: 300, overflowY: "auto" }}>
                    {filtered.map((v, i) => (
                      <div key={i} onClick={() => speak(v.inf)} style={{ background: "#0f0f1a", border: "1px solid #2a2a3a", borderRadius: 8, padding: "8px 10px", cursor: "pointer" }}>
                        <div style={{ color: "#fff", fontWeight: 700, fontSize: 13 }}>{v.inf}</div>
                        <div style={{ color: "#888", fontSize: 11, marginTop: 1 }}>{v.en}</div>
                      </div>
                    ))}
                    {filtered.length === 0 && <div style={{ color: "#555", fontSize: 13, gridColumn: "span 2", textAlign: "center", padding: 16 }}>No verbs found.</div>}
                  </div>
                </div>
              )}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

const TABS = [
  { id: "chat",         label: "💬 Chat" },
  { id: "vocab",        label: "📚 Vocab" },
  { id: "alphabet",     label: "🔤 Alphabet" },
  { id: "translate",    label: "🔄 Translate" },
  { id: "conjugations", label: "📝 Verbs" },
];

function App() {
  const [tab, setTab] = useState("chat");
  const [appData, setAppData] = useState(loadData);

  useEffect(() => {
    const today = new Date().toDateString();
    const streak = appData.streak || { lastDate: null, count: 0 };
    if (streak.lastDate !== today) {
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
      const newCount = streak.lastDate === yesterday.toDateString() ? streak.count + 1 : 1;
      const updated = { ...appData, streak: { lastDate: today, count: newCount } };
      setAppData(updated);
      saveData(updated);
    }
  }, []);

  return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#0f0f1a", height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Header appData={appData} />
      <div style={{ display: "flex", background: "#1a1a2e", borderBottom: "1px solid #333", overflowX: "auto" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: "none", padding: "10px 14px", background: "none", border: "none", borderBottom: tab === t.id ? "2px solid #00d4ff" : "2px solid transparent", color: tab === t.id ? "#00d4ff" : "#888", fontWeight: tab === t.id ? 800 : 400, cursor: "pointer", fontSize: 12, whiteSpace: "nowrap", transition: "all 0.2s" }}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{ flex: 1, overflow: "hidden" }}>
        {tab === "chat"         && <ChatTab appData={appData} setAppData={setAppData} />}
        {tab === "vocab"        && <VocabTab appData={appData} setAppData={setAppData} />}
        {tab === "alphabet"     && <AlphabetTab />}
        {tab === "translate"    && <TranslateTab />}
        {tab === "conjugations" && <ConjugationsTab />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
